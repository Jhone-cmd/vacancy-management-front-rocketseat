<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:tiles="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Cadastro da Empresa</title>
</head>

<body class="bg-sky-800 h-screen items-center flex justify-center">
    <form id="submitForm" action="" class="flex gap-24" th:action="@{/company/create}" method="post"
        th:object="${company}">

        <div class="space-y-8 bg-zinc-700 rounded-md p-10">
            <h1 class="text-white text-center">Empresa, crie o seu cadastro gratuitamente.</h1>

            <input type="text" name="name"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                placeholder="Digite o seu nome" th:field="*{name}">

            <input type="text" id="webSite" name="webSite"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                placeholder="WebSite" th:field="*{webSite}">

            <input type="email" name="email" required
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                placeholder="E-mail" th:field="*{email}">

            <input type="password" id="password" name="password"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                placeholder="Senha" th:field="*{password}">

            <input type="password" id="confirmPassword" name="confirmPassword"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                placeholder="Confirme sua senha">

            <textarea name="description" placeholder="Digite uma breve descrição sobre você"
                class="bg-gray-50 text-gray-900 text-xd rounded w-96 block p-3 focus:outline-none focus:ring-green-600 focus:ring-2"
                th:field="*{description}"></textarea>

            <div class="flex items-center justify-center">
                <p class="text-red-500" th:if="${error}" th:text="${error}"></p>
                <p class="text-red-500 font-semibold hidden" id="password_error">As senhas não conferem</p>
            </div>

            <button class="bg-green-900 w-96 p-4 rounded text-white font-bold hover:bg-green-700"
                id="submitForm">Cadastre-se</button>

            <a href="/candidate/login"
                class="block text-center font-semibold text-green-500 underline underline-offset-2 hover:text-green-600">Login</a>
        </div>

        <div class="text-white max-w-100 text-6xl flex items-center">
            Vacancy Management
        </div>
    </form>
</body>

<script>
    document.getElementById("submitForm").addEventListener("submit", (event) => {
        var password = document.getElementById("password").value
        var confirmPassword = document.getElementById("confirmPassword").value

        if (password !== confirmPassword) {
            document.getElementById("password_error").classList.remove("hidden")
            event.preventDefault()
        }
    })
</script>

</html>
